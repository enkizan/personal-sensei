services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: japanese_platform
    ports:
      - "10001:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: node:22-slim
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "10002:3000"
    env_file: .env.local          # picks up ANTHROPIC_API_KEY and PASSCODE
    environment:
      # Override DATABASE_URL to use the internal docker network (db:5432)
      DATABASE_URL: postgresql://postgres:postgres@db:5432/japanese_platform
      NODE_ENV: development
    volumes:
      - .:/app
      # Isolate node_modules from host to avoid binary incompatibilities
      - node_modules:/app/node_modules
    command: sh -c "npm install --silent && npm run dev"

volumes:
  pgdata:
  node_modules:
